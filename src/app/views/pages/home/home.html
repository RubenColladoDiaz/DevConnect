<app-header />
@if (!user().username) {
  <button
    class="m-auto d-flex rounded-4 px-4 py-1 fs-5 login-button-background border-0"
    routerLink="/login"
  >
    Login
  </button>
}
<main>
  <section>
    @if (user().username) {
      <a href="">
        <div class="user-target">
          <img
            src="https://i.pinimg.com/474x/16/e3/16/16e31690d95888a1532ea992b8f3ddf4.jpg"
            alt="User logo"
          />
          Welcome, {{ user().username }}
        </div>
      </a>
    } @else {
      <a href="/login">
        <div class="user-target">
          <img
            src="https://i.pinimg.com/474x/16/e3/16/16e31690d95888a1532ea992b8f3ddf4.jpg"
            alt="User logo"
          />
          Welcome, Unknown
        </div>
      </a>
    }
  </section>

  <section>
    @if (creating() && user().username) {
      <app-new-post-template [user]="user()" />
    }
    @if (posts.length > 0) {
      @for (post of posts; track post) {
        <app-post-template [(post)]="post" />
      }
    } @else {
      <app-offline-post />
    }
  </section>
  <app-new-post-button [(creating)]="creating" />
</main>
